<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signup_page</title>
<link rel="stylesheet" href="Signup_page.css">
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-…" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Navbar -->
<div class="navbar">
<div class="navbar-left">
<img src="job-search-logo.webp" alt="Logo">
<span class="site-name">Job Search</span>
</div>

<div class="nav-links">
  <a href="index.html">Home</a>
  <a href="About_page.html">About</a>
  <a href="Join_Class.html">Join Class</a>
</div>

<!-- Hamburger -->
<button class="menu-btn" id="menu-btn" onclick="openSidebar()">&#9776;</button>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<button class="close-btn" onclick="closeSidebar()">✖</button>
<a href="index.html"><i class="fas fa-home"></i> Home</a>
<a href="About_page.html"><i class="fas fa-info-circle"></i> About</a>
<a href="Join_Class.html"><i class="fas fa-chalkboard-teacher"></i> Join Class</a>
</div>


<!-- Signup section -->
<section class="signup-section">
  <div class="signup-container">
    <h2>Create Your Account</h2>
    <p>Job Search</p>

    <form class="signup-form">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" placeholder="Full Name" required>
      </div>

      <div class="input-group">
      <i class="fas fa-venus-mars"></i>
    <select required>
      <option value="" disabled selected>Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
      </div>

      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-group password-group">
  <i class="fas fa-lock"></i>
  <input type="password" id="password" placeholder="Create Password" required>
  <span class="toggle-password" onclick="togglePassword('password', this)">
    <i class="fas fa-eye"></i>
  </span>
</div>

<div class="input-group password-group">
  <i class="fas fa-lock"></i>
  <input type="password" id="confirm-password" placeholder="Confirm Password" required>
  <span class="toggle-password" onclick="togglePassword('confirm-password', this)">
    <i class="fas fa-eye"></i>
  </span>
</div>

      <button type="submit" class="signup-submit-btn" id="signupBtn">
        <span id="btnText">
        <i class="fas fa-user-plus"></i> Sign Up
        </span>
      </button>
    </form>

    <p class="login-text">
      Already have an account? <a href="#">Login</a>
    </p>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
