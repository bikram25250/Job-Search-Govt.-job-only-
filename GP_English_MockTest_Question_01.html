<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mock Test - 01</title>

    <link rel="stylesheet" href="GP_English_MockTest_Question_01.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Top Bar -->

        <div class="top-bar">

            <a href="GP_MockTest_Subject.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>

            <div class="timer" id="timer">
                15:00
            </div>

        </div>

        <!-- User Info -->

        <div class="user-info">

            <h2 id="userName">
                Welcome User 
            </h2>

            <p id="userId">
                User ID
            </p>

        </div>

        <!-- Exam Title -->

        <h1 class="exam-title">
            English Mock Test - 01
        </h1>

         <p class="exam-subtitle">
            Gram Panchayat 2026
        </p>

        <!-- Mobile Question Button -->

        <button id="menuBtn" class="menu-btn">
            <i class="fas fa-list"></i>
            Questions
        </button>

        <!-- Main Layout -->

        <div class="exam-layout">

            <!-- Left Question Palette -->

            <div class="palette-section" id="paletteSection">

                <div class="palette-header">

                    <h3>Question Navigator</h3>

                    <button id="closePalette">
                        ✕
                    </button>

                </div>

                <div class="palette" id="palette">

                </div>

            </div>

            <!-- Question Area -->

            <div class="question-section">

                <div class="question-box">

                    <div id="questionNumber" class="question-number">

                        Question 1 of 20

                    </div>

                    <h2 id="questionText">

                        Loading...

                    </h2>

                    <div id="optionsContainer">

                    </div>

                </div>

                <!-- Navigation -->

                <div class="navigation">

                    <button id="prevBtn">

                        Previous

                    </button>

                    <button id="nextBtn">

                        Next

                    </button>

                </div>

                <!-- Submit -->

                <button id="submitBtn">

                    Submit Test

                </button>

            </div>

        </div>

    </div>

    <script src="GP_English_MockTest_Question_01.js"></script>

</body>

</html>
