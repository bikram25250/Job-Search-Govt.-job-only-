<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test - Job Search</title>
</head>
<body>
    
    <p id="welcomeUser" class="welcome-user"></p>
    <h1>Mock Test Section</h1>
    <p>Comming Soon...</p>

    <!-- This is for show user name after heading-->
    <script>
        const userName = localStorage.getItem("userName");
        const welcomeUser = document.getElementById("welcomeUser");

        if (userName && welcomeUser) {
            welcomeUser.innerHTML = `Welcome, <span>${userName}</span> 👋`;
        }
    </script>

</body>
</html>
