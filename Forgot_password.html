<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Job Search</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Forgot Password CSS -->
  <link rel="stylesheet" href="Forgot_password.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-left">
      <img src="./Images/job-search-logo.webp" alt="Logo">
      <span class="site-name">Job Search</span>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="About_page.html">About</a>
      <a href="Join_Class.html">Join Class</a>
      <a href="Signup_page.html" class="signup-btn">Sign Up</a>
    </div>

    <!-- Hamburger -->
    <button class="menu-btn" onclick="openSidebar()">&#9776;</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">✖</button>

    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="About_page.html"><i class="fas fa-info-circle"></i> About</a>
    <a href="Join_Class.html"><i class="fas fa-chalkboard-teacher"></i> Join Class</a>
    <a href="Signup_page.html" class="sidebar-signup">
      <i class="fas fa-user-plus"></i> Sign Up
    </a>
  </div>

  <!-- Forgot Password Section -->
  <section class="forgot-section">
    <div class="forgot-container">

      <div class="forgot-icon">
        <i class="fas fa-key"></i>
      </div>

      <h1>Forgot Password?</h1>

      <p>
        Enter your registered email address and we will send you a password reset link.
      </p>

      <form id="forgotForm">

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input
            type="email"
            id="forgotEmail"
            placeholder="Enter your email"
            required
          >
        </div>

        <button type="submit" class="forgot-btn" id="forgotBtn">
          <i class="fas fa-paper-plane"></i>
          Send Reset Link
        </button>

      </form>

      <div class="back-login">
        <a href="Signin_page.html">
          <i class="fas fa-arrow-left"></i> Back to Sign In
        </a>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
  <script type="module" src="Forgot_password.js"></script>

</body>
</html>
